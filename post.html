  <style>
    * { scroll-behavior: smooth; }

    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {

      src: url('fonts/GoogleSans-Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-SemiBold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-Italic.woff2') format('woff2');
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-MediumItalic.woff2') format('woff2');
      font-weight: 500;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-SemiBoldItalic.woff2') format('woff2');
      font-weight: 600;
      font-style: italic;
      font-display: swap;
    }
    @font-face {
      font-family: 'Google Sans';
      src: url('fonts/GoogleSans-BoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: italic;
      font-display: swap;
    }

    body { font-family: 'Google Sans', system-ui, -apple-system, sans-serif; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(9, 5, 2, 0.97), rgba(9, 5, 2, 0.97)),
        radial-gradient(circle at 25% 25%, rgba(210, 206, 203, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(69, 175, 210, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(210, 206, 203, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(210, 206, 203, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .shimmer {
      background: linear-gradient(90deg, #f5e3d7 0%, #d2cecb 25%, #f5e3d7 50%, #d2cecb 75%, #f5e3d7 100%);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmerMove 4s ease-in-out infinite;
    }

    @keyframes shimmerMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .glow-emerald {
      box-shadow: 0 0 20px rgba(210, 206, 203, 0.15), 0 0 60px rgba(210, 206, 203, 0.05);
      transition: box-shadow 0.3s ease;
    }
    .glow-emerald:hover {
      box-shadow: 0 0 30px rgba(210, 206, 203, 0.3), 0 0 80px rgba(210, 206, 203, 0.1);
    }

    .btn-futuristic {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-futuristic::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(210, 206, 203, 0.2), rgba(69, 175, 210, 0.2));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-futuristic:hover::before {
      opacity: 1;
    }
    .btn-futuristic:hover {
      box-shadow: 0 0 25px rgba(210, 206, 203, 0.3), 0 0 60px rgba(210, 206, 203, 0.1);
      transform: translateY(-2px);
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .pulse-glow { animation: pulseGlow 3s ease-in-out infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-up {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .animate-fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .glass-nav {
      background: rgba(9, 5, 2, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(210, 206, 203, 0.1);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    .prose {
      color: #f5e3d7;
      max-width: 65ch;
      line-height: 1.75;
    }
    .prose h1, .prose h2, .prose h3, .prose h4 {
      color: #f5e3d7;
      font-weight: 600;
      letter-spacing: -0.025em;
    }
    .prose h1 { font-size: 2.25rem; margin-top: 0; margin-bottom: 1.5rem; }
    .prose h2 { font-size: 1.75rem; margin-top: 2.5rem; margin-bottom: 1rem; }
    .prose h3 { font-size: 1.25rem; margin-top: 2rem; margin-bottom: 0.75rem; }
    .prose p { margin-top: 1.25rem; margin-bottom: 1.25rem; }
    .prose a { color: #d2cecb; text-decoration: none; }
    .prose a:hover { color: #d2cecb; }
    .prose strong { color: #f5e3d7; font-weight: 600; }
    .prose ul, .prose ol { margin-top: 1rem; margin-bottom: 1rem; padding-left: 1.5rem; }
    .prose li { margin-top: 0.375rem; margin-bottom: 0.375rem; }
    .prose table { width: 100%; margin-top: 1.5rem; margin-bottom: 1.5rem; border-collapse: collapse; }
    .prose th, .prose td { border: 1px solid rgba(210, 206, 203, 0.2); padding: 0.75rem 1rem; text-align: left; }
    .prose th { background: rgba(210, 206, 203, 0.1); color: #f5e3d7; font-weight: 600; }
    .prose td { background: rgba(9, 5, 2, 0.3); }
    .prose tr:nth-child(even) td { background: rgba(9, 5, 2, 0.5); }
    .prose blockquote { border-left: 3px solid #d2cecb; padding-left: 1rem; margin: 1.5rem 0; color: #f5e3d7; }
    .prose code { background: rgba(210, 206, 203, 0.1); padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875em; color: #d2cecb; }
    .prose pre { background: rgba(9, 5, 2, 0.5); border: 1px solid rgba(210, 206, 203, 0.15); border-radius: 0.75rem; padding: 1.25rem; overflow-x: auto; }
    .prose pre code { background: none; padding: 0; border-radius: 0; color: inherit; }
    .prose hr { border-color: rgba(210, 206, 203, 0.15); margin: 2rem 0; }
  </style>
</head>
<body class="bg-[#090502] text-[#f5e3d7] antialiased">

  <!-- Load Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.animate-fade-up').forEach(el => observer.observe(el));

    const mobileMenu = document.getElementById('mobile-menu');
    mobileMenu.addEventListener('click', (e) => {
      if (e.target === mobileMenu) mobileMenu.close();
    });

    // Get the filename from the URL (e.g., post.html?file=hello.md)
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file') || 'memory.md';

    fetch(`./content/${file}`)
      .then(response => response.text())
      .then(markdown => {
        // Convert Markdown to HTML and inject into the page
        document.getElementById('content').innerHTML = marked.parse(markdown);
      });
  </script>
